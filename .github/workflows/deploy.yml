# =============================================================================
# Deployment is now owned by the infra repository
# =============================================================================
#
# This workflow file is intentionally minimal. Deployment to GCP Cloud Run
# (including all pilot-specific configuration) has been moved to the infra
# repository, which receives a `repository_dispatch` event from CI after a
# successful build.
#
# What this repo does:
#   - Builds and tests the application (ci.yml)
#   - Publishes versioned images to GitHub Container Registry
#   - Sends an `app-release` dispatch event to the infra repo (ci.yml)
#
# What the infra repo does:
#   - Listens for `app-release` events
#   - Decides which pilots and environments to deploy to
#   - Manages Cloud Run services, GCS volumes, and per-pilot secrets
#
# See docs/DEPLOYMENT_CONTRACT.md for the full artifact contract.
# See docs/MIGRATION_NOTES.md for a summary of what changed.
#
# To re-enable a direct deployment from this repo (e.g. for a non-GCP target),
# uncomment and configure one of the platform templates below.
# =============================================================================

name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Informational job – explains the new deployment model.
  # Remove this job once you configure a real deployment target below.
  # ---------------------------------------------------------------------------
  info:
    name: Deployment Model Info
    runs-on: ubuntu-latest
    steps:
      - name: Show deployment model
        run: |
          echo "## Deployment Model" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deployment is managed by the infra repository." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This repo publishes images; the infra repo deploys them." >> $GITHUB_STEP_SUMMARY
          echo "See \`docs/DEPLOYMENT_CONTRACT.md\` for the artifact contract." >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Optional: add a direct deployment target here if needed for non-GCP use.
  # Examples are commented out below.
